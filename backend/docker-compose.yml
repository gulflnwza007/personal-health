version: '3.8'
services:
  mysql:
    image: mysql:latest
    container_name: mysql_health
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: health_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - health_network
    restart: always

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin_700
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      pma_user: root
      pma_password: root
      UPLOAD_LIMIT: 300M
    ports:
        - "8000:80"
    depends_on:
        - mysql
    networks:
        - health_network
    restart: always
networks:
  health_network:
    driver: bridge

volumes:
  mysql_data:
    driver: local